<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#070809">
    <title>PPL ELITE</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="top-bar">
        <button class="avatar" type="button" aria-label="Profile">
          <span>PE</span>
        </button>
        <div class="brand-lockup">
          <span class="kicker">TRAINING LOG</span>
          <strong>PPL ELITE</strong>
        </div>
        <button class="icon-button" type="button" aria-label="Notifications">
          <span class="bell-dot"></span>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 16v-5.2a6 6 0 0 0-4.6-5.84V3.8a1.4 1.4 0 0 0-2.8 0v1.16A6 6 0 0 0 6 10.8V16l-1.4 2v.8h14.8V18L18 16Zm-7.7 4.1a1.9 1.9 0 0 0 3.4 0h-3.4Z"/></svg>
        </button>
      </header>

      <main id="view" class="view" tabindex="-1"></main>

      <nav class="bottom-nav" aria-label="Primary navigation">
        <button class="nav-item active" data-tab="home" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 11.2 12 4l8 7.2v8.4a.9.9 0 0 1-.9.9h-4.7v-6.3H9.6v6.3H4.9a.9.9 0 0 1-.9-.9v-8.4Z"/></svg>
          <span>Home</span>
        </button>
        <button class="nav-item" data-tab="active" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7.4 6.3H4.9v11.4h2.5V6.3Zm11.7 0h-2.5v11.4h2.5V6.3ZM9 9.9h6v4.2H9V9.9ZM2.8 9.2H1.4v5.6h1.4V9.2Zm19.8 0h-1.4v5.6h1.4V9.2Z"/></svg>
          <span>Active</span>
        </button>
        <button class="nav-item" data-tab="history" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h14v3H5V4Zm0 5h14v11H5V9Zm3 2v2h8v-2H8Zm0 4v2h5v-2H8Z"/></svg>
          <span>History</span>
        </button>
      </nav>
    </div>

    <div id="modal-root"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="app.js" defer></script>
  </body>
</html>
